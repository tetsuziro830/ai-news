<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIニュース管理画面</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.6rem; color: #7eb8f7; margin-bottom: 0.3rem; }
    .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }

    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; color: #9aa5b4; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* フィード一覧 */
    .feed-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem; background: #12141c; border-radius: 8px; margin-bottom: 0.6rem; }
    .feed-item .feed-name { flex: 1; font-weight: 600; color: #e0e0e0; }
    .feed-item .feed-url { flex: 2; font-size: 0.78rem; color: #5a6a7a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .feed-item .feed-count { width: 60px; text-align: center; }
    .feed-item input[type=number] { width: 55px; background: #1e2130; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; padding: 0.3rem 0.4rem; text-align: center; }
    .feed-item .actions { display: flex; gap: 0.4rem; }

    btn { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.4rem 0.8rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: opacity 0.15s; }
    btn:hover { opacity: 0.8; }
    .btn-save { background: #2563eb; color: #fff; }
    .btn-delete { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
    .btn-reload { background: #065f46; color: #6ee7b7; font-size: 1rem; padding: 0.7rem 2rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; transition: background 0.2s; }
    .btn-reload:hover { background: #047857; }
    .btn-reload:disabled { background: #1a3a2a; color: #4a8a6a; cursor: not-allowed; }
    .btn-add { background: #1e3a5f; color: #7eb8f7; border: 1px solid #2a5a9f; padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.8rem; }

    /* 追加フォーム */
    .add-form { display: grid; grid-template-columns: 2fr 1fr 70px; gap: 0.6rem; margin-top: 0.8rem; }
    .add-form input { background: #12141c; border: 1px solid #2a2d3a; border-radius: 8px; color: #e0e0e0; padding: 0.55rem 0.8rem; font-size: 0.9rem; }
    .add-form input:focus { outline: none; border-color: #2563eb; }
    .count-label { font-size: 0.78rem; color: #5a6a7a; margin-top: 0.3rem; }

    .badge-count { background: #1e3a5f; color: #7eb8f7; border-radius: 20px; padding: 0.15rem 0.6rem; font-size: 0.75rem; font-weight: 700; }

    .status-msg { margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.88rem; display: none; }
    .status-ok { background: #063a20; color: #6ee7b7; border: 1px solid #0a5a30; }
    .status-err { background: #3a1010; color: #f87171; border: 1px solid #5a2020; }
    .status-running { background: #1e3010; color: #a3e635; border: 1px solid #365a10; }

    .limit-note { font-size: 0.78rem; color: #5a6a7a; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>⚙️ AIニュース管理画面</h1>
  <p class="subtitle">RSSフィードの追加・編集・削除と手動更新</p>

  <!-- フィード一覧 -->
  <div class="card">
    <h2>登録フィード一覧 <span class="badge-count" id="feed-count">0</span> / 10</h2>
    <div id="feed-list"></div>
    <p class="limit-note">※ 最大10サイトまで登録できます</p>
  </div>

  <!-- 新規追加 -->
  <div class="card">
    <h2>新規フィード追加</h2>
    <div class="add-form">
      <input type="text" id="new-url" placeholder="RSS フィード URL *">
      <input type="text" id="new-name" placeholder="サイト名（任意）">
      <input type="number" id="new-count" value="5" min="1" max="20">
    </div>
    <p class="count-label">　　　　　　　　　　　　　　　　　　　　　　　　　　取得件数（1〜20）</p>
    <button class="btn-add" onclick="addFeed()">＋ 追加する</button>
    <div id="add-status" class="status-msg"></div>
  </div>

  <!-- 手動更新 -->
  <div class="card">
    <h2>手動更新</h2>
    <p style="color:#9aa5b4; font-size:0.9rem; margin-bottom:1rem;">ボタンを押すと即座にクロールを開始し、ai.htmlを更新します。</p>
    <button class="btn-reload" id="reload-btn" onclick="reloadNews()">🔄 今すぐ更新する</button>
    <div id="reload-status" class="status-msg"></div>
  </div>
</div>

<script>
async function loadFeeds() {
  const res = await fetch('/api/feeds');
  const feeds = await res.json();
  document.getElementById('feed-count').textContent = feeds.length;
  const list = document.getElementById('feed-list');
  list.innerHTML = '';
  feeds.forEach((f, i) => {
    list.innerHTML += `
      <div class="feed-item" id="row-${i}">
        <div class="feed-name">
          <input type="text" value="${f.name}" id="name-${i}" style="background:#1a1d27;border:1px solid #333;border-radius:6px;color:#e0e0e0;padding:0.3rem 0.5rem;width:140px;">
        </div>
        <div class="feed-url" title="${f.url}">
          <input type="text" value="${f.url}" id="url-${i}" style="background:#1a1d27;border:1px solid #333;border-radius:6px;color:#9aa5b4;padding:0.3rem 0.5rem;width:100%;font-size:0.78rem;">
        </div>
        <div class="feed-count">
          <input type="number" value="${f.max_items}" id="cnt-${i}" min="1" max="20">
        </div>
        <div class="actions">
          <button style="background:#1e3a5f;color:#7eb8f7;border:1px solid #2a5a9f;border-radius:6px;padding:0.35rem 0.7rem;cursor:pointer;font-size:0.8rem;" onclick="saveFeed(${i})">保存</button>
          <button style="background:#3a1a1a;color:#f87171;border:1px solid #5a2a2a;border-radius:6px;padding:0.35rem 0.7rem;cursor:pointer;font-size:0.8rem;" onclick="deleteFeed(${i})">削除</button>
        </div>
      </div>`;
  });
}

async function saveFeed(i) {
  const url = document.getElementById(`url-${i}`).value;
  const name = document.getElementById(`name-${i}`).value;
  const max_items = parseInt(document.getElementById(`cnt-${i}`).value);
  const res = await fetch(`/api/feeds/${i}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({url, name, max_items})
  });
  const data = await res.json();
  if (data.ok) { showMsg('add-status', '保存しました', 'ok'); loadFeeds(); }
  else showMsg('add-status', data.error, 'err');
}

async function deleteFeed(i) {
  if (!confirm('削除しますか？')) return;
  const res = await fetch(`/api/feeds/${i}`, {method: 'DELETE'});
  const data = await res.json();
  if (data.ok) loadFeeds();
  else alert(data.error);
}

async function addFeed() {
  const url = document.getElementById('new-url').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const max_items = parseInt(document.getElementById('new-count').value);
  if (!url) { showMsg('add-status', 'URLを入力してください', 'err'); return; }
  const res = await fetch('/api/feeds', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({url, name, max_items})
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('new-url').value = '';
    document.getElementById('new-name').value = '';
    document.getElementById('new-count').value = '5';
    showMsg('add-status', '追加しました', 'ok');
    loadFeeds();
  } else {
    showMsg('add-status', data.error, 'err');
  }
}

async function reloadNews() {
  const btn = document.getElementById('reload-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 更新中...';
  showMsg('reload-status', 'クロールを開始しました。完了まで1〜2分かかります...', 'running');
  const res = await fetch('/api/reload', {method: 'POST'});
  const data = await res.json();
  if (data.ok) {
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '🔄 今すぐ更新する';
      showMsg('reload-status', '更新完了しました！ ai.html を確認してください。', 'ok');
    }, 90000);
  } else {
    btn.disabled = false;
    btn.textContent = '🔄 今すぐ更新する';
    showMsg('reload-status', data.error, 'err');
  }
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status-msg status-' + type;
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => el.style.display = 'none', 4000);
}

loadFeeds();
</script>
</body>
</html>
